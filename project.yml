name: Kontakt
options:
  bundleIdPrefix: com.dgrlabs
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: 2CTUXD4C44

targets:
  Kontakt:
    type: application
    platform: iOS
    sources:
      - Kontakt
    resources:
      - path: Kontakt/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dgrlabs.kontakt
        PRODUCT_NAME: Kontakt
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSContactsUsageDescription: "People needs access to your contacts to display and manage them. All data stays on your device."
        INFOPLIST_KEY_CFBundleDisplayName: People
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"

  KontaktTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - KontaktTests
    dependencies:
      - target: Kontakt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dgrlabs.kontakt.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Kontakt.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Kontakt"
